services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on: [kafka]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kafkamind
      POSTGRES_USER: kafkamind
      POSTGRES_PASSWORD: kafkamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on: [kafka, postgres]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/kafkamind
      DATABASE_USER: kafkamind
      DATABASE_PASSWORD: kafkamind
      DATABASE_DRIVER: org.postgresql.Driver
      JWT_SECRET: kafkamind-super-secret-key-change-in-production-min-256-bits
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your-key-here}

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules

volumes:
  pgdata:
