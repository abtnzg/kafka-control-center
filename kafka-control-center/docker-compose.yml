version: "3.9"

services:
  # -------------------------
  # CLUSTER A
  # -------------------------
  zookeeper-a:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka-a:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper-a]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-a:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  schema-registry-a:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on: [kafka-a]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-a
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://localhost:9092

  # -------------------------
  # CLUSTER B
  # -------------------------
  zookeeper-b:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181   # IMPORTANT : interne = 2181
    ports:
      - "2182:2181"                 # externe 2182 → interne 2181

  kafka-b:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper-b]
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-b:2181   # IMPORTANT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  schema-registry-b:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on: [kafka-b]
    ports:
      - "8082:8082"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-b
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://localhost:9093

  # -------------------------
  # DATABASE
  # -------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kafkamind
      POSTGRES_USER: kafkamind
      POSTGRES_PASSWORD: kafkamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # -------------------------
  # BACKEND
  # -------------------------
  backend:
    build: ./backend
    depends_on: [kafka-a, kafka-b, postgres]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/kafkamind
      DATABASE_USER: kafkamind
      DATABASE_PASSWORD: kafkamind
      DATABASE_DRIVER: org.postgresql.Driver
      JWT_SECRET: kafkamind-super-secret-key-change-in-production-min-256-bits
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your-key-here}

  # -------------------------
  # FRONTEND
  # -------------------------
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules

volumes:
  pgdata: